<!doctype html>
<html lang="en">
    <head>
        <title>Frontend Mentor | Social Links Profile</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div class="container">
            <main class="card">
                <img
                    class="card__avatar"
                    src="./images/avatar-jessica.jpg"
                    alt="Jessica Randall"
                />
                <h2>Jessica Randall</h2>
                <h3>London, United Kingdom</h3>
                <p>"Front-end developer and avid reader."</p>

                <div class="card__links">
                    <a
                        class="card__link"
                        href="https://www.github.com"
                        target="_blank"
                        >Github</a
                    >
                    <a
                        class="card__link"
                        href="https://www.frontendmentor.io"
                        target="_blank"
                        >Frontend Mentor</a
                    >
                    <a
                        class="card__link"
                        href="https://www.linkedin.com"
                        target="_blank"
                        >LinkedIn</a
                    >
                    <a
                        class="card__link"
                        href="https://www.youtube.com"
                        target="_blank"
                        >YouTube</a
                    >
                    <a
                        class="card__link"
                        href="https://www.instagram.com"
                        target="_blank"
                        >Instagram</a
                    >
                </div>
            </main>

            <footer class="attribution">
                Challenge by
                <a
                    href="https://www.frontendmentor.io?ref=challenge"
                    target="_blank"
                    >Frontend Mentor</a
                >. Coded by
                <a
                    href="https://github.com/smills1020/frontend-mentor-qr-code"
                    target="_blank"
                    >Sean Mills</a
                >.
            </footer>
        </div>
    </body>
</html>
